<h3 class="card-header">Forgot Password</h3>
<div class="card-body">
    <form *ngIf="!resetLink" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
            <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
                <div *ngIf="f.email.errors.required">Email is required</div>
                <div *ngIf="f.email.errors.email">Email is invalid</div>
            </div>
        </div>
        <div class="mb-3">
            <button [disabled]="loading" class="btn btn-primary">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                Submit
            </button>
            <a routerLink="../login" class="btn btn-link">Cancel</a>
        </div>
    </form>

    <div *ngIf="resetLink" class="text-center py-4">
        <h5 class="mb-3">Reset Link Generated</h5>
        <p class="mb-2">Click the link below to reset your password:</p>
        <div class="p-3 mb-3 border rounded bg-light" style="word-break: break-all;">
            <a [href]="resetLink">{{resetLink}}</a>
        </div>
        <p class="text-muted small mb-4">NOTE: The API returned this link so you can test without SMTP configured.</p>
        <a routerLink="../login" class="btn btn-outline-primary">BACK TO LOGIN</a>
    </div>
</div>
